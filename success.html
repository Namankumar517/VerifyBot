<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }}</title>
    <style>
        body {
            background: linear-gradient(135deg, #0b1020, #161b2e);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 22px;
            text-align: center;
            width: 460px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.35);
        }
        .ok {
            color: #43b581;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 14px;
        }
        .msg {
            color: #d7dbe4;
            margin-top: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="ok">✅ Verification Successful</div>
        <p>Welcome, <b>{{ username }}</b></p>
        <p>Your Discord ID: <b>{{ user_id }}</b></p>
        <p class="msg">{{ message }}</p>
        <p>You may now return to Discord.</p>
    </div>
</body>
</html>
