<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }}</title>
    <style>
        body {
            background: linear-gradient(135deg, #0b1020, #161b2e);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 22px;
            text-align: center;
            width: 460px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.35);
        }
        .bad {
            color: #ed4245;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 14px;
        }
        .reason {
            color: #d7dbe4;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 18px;
            border-radius: 12px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="bad">❌ Verification Failed</div>
        <p class="reason">{{ message }}</p>
        <a class="btn" href="/verify">Try Again</a>
    </div>
</body>
</html>
