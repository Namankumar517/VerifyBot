<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ brand_name }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0b1020, #161b2e);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: 430px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 34px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.35);
        }
        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 14px 22px;
            border-radius: 12px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .muted {
            color: #cfd5e6;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 {{ brand_name }}</h1>
        <p class="muted">Complete the verification process to unlock your Discord server access.</p>
        <p class="muted">Use the official verification link from your Discord server.</p>
    </div>
</body>
</html>
